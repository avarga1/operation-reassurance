name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest tests/ -v --tb=short

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test]
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (no API token needed)
      contents: write   # required to create GitHub Release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Bump version in pyproject.toml to match tag
        run: poetry version ${{ steps.version.outputs.version }}

      - name: Build package
        run: poetry build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No PYPI_API_TOKEN needed — uses OIDC trusted publishing instead.
        # One-time setup: go to pypi.org → your project → Publishing → add GitHub trusted publisher
        # Publisher: avarga1/operation-reassurance, workflow: publish.yml, env: pypi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Install

            ```bash
            pip install operation-reassurance==${{ steps.version.outputs.version }}
            ```

            Or upgrade:
            ```bash
            pip install --upgrade operation-reassurance
            ```

            See [CHANGELOG.md](https://github.com/avarga1/operation-reassurance/blob/main/CHANGELOG.md) for what's new.
          files: dist/*
          generate_release_notes: true
